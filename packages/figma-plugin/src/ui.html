<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Click-Ship</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-bg: #ffffff;
      --color-bg-secondary: #f5f5f5;
      --color-text: #333333;
      --color-text-secondary: #666666;
      --color-border: #e0e0e0;
      --color-primary: #18a0fb;
      --color-primary-hover: #0d8ce6;
      --color-success: #1bc47d;
      --color-error: #f24822;
      --radius-sm: 4px;
      --radius-md: 8px;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
    }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #2c2c2c;
        --color-bg-secondary: #383838;
        --color-text: #ffffff;
        --color-text-secondary: #b3b3b3;
        --color-border: #444444;
      }
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      line-height: 1.5;
      color: var(--color-text);
      background: var(--color-bg);
      padding: var(--spacing-md);
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: var(--spacing-md);
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    h1 .logo {
      width: 24px;
      height: 24px;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: var(--spacing-sm);
      color: var(--color-text-secondary);
    }

    .section {
      margin-bottom: var(--spacing-lg);
    }

    /* Auth Section */
    .auth-section {
      text-align: center;
      padding: var(--spacing-lg);
    }

    .auth-section p {
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-md);
    }

    /* Selection Info */
    .selection-info {
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-md);
    }

    .selection-info .label {
      font-size: 11px;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .selection-info .value {
      font-size: 14px;
      font-weight: 500;
      margin-top: var(--spacing-xs);
    }

    .no-selection {
      color: var(--color-text-secondary);
      text-align: center;
      padding: var(--spacing-lg);
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      border: 2px dashed var(--color-border);
    }

    /* Style Preview */
    .style-preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-sm);
      margin-top: var(--spacing-md);
    }

    .style-item {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: var(--spacing-sm);
    }

    .style-item .property {
      font-size: 10px;
      color: var(--color-text-secondary);
      text-transform: uppercase;
    }

    .style-item .value {
      font-family: monospace;
      font-size: 11px;
      margin-top: 2px;
    }

    .color-preview {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 2px;
      border: 1px solid var(--color-border);
      vertical-align: middle;
      margin-right: 4px;
    }

    /* Form Elements */
    .form-group {
      margin-bottom: var(--spacing-md);
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-xs);
    }

    input, select, textarea {
      width: 100%;
      padding: var(--spacing-sm);
      font-size: 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-bg);
      color: var(--color-text);
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-xs);
      padding: var(--spacing-sm) var(--spacing-md);
      font-size: 12px;
      font-weight: 500;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--color-primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--color-primary-hover);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--color-bg-secondary);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }

    .btn-secondary:hover {
      background: var(--color-border);
    }

    .btn-full {
      width: 100%;
    }

    /* Status Messages */
    .status {
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--radius-sm);
      font-size: 11px;
      margin-top: var(--spacing-md);
    }

    .status.success {
      background: rgba(27, 196, 125, 0.1);
      color: var(--color-success);
    }

    .status.error {
      background: rgba(242, 72, 34, 0.1);
      color: var(--color-error);
    }

    .status.loading {
      background: rgba(24, 160, 251, 0.1);
      color: var(--color-primary);
    }

    /* User Info */
    .user-info {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm);
      background: var(--color-bg-secondary);
      border-radius: var(--radius-sm);
      margin-bottom: var(--spacing-md);
    }

    .user-info img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }

    .user-info .name {
      font-weight: 500;
      flex: 1;
    }

    .user-info .logout {
      font-size: 11px;
      color: var(--color-primary);
      cursor: pointer;
    }

    /* Footer */
    .footer {
      margin-top: var(--spacing-lg);
      padding-top: var(--spacing-md);
      border-top: 1px solid var(--color-border);
      text-align: center;
      font-size: 10px;
      color: var(--color-text-secondary);
    }

    .footer a {
      color: var(--color-primary);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>
      <span class="logo">🚀</span>
      Click-Ship
    </h1>

    <!-- Auth Section (shown when not authenticated) -->
    <div id="auth-section" class="auth-section" style="display: none;">
      <p>Connect your Click-Ship account to start creating PRs from Figma</p>
      <button class="btn btn-primary btn-full" id="login-btn">
        Connect to Click-Ship
      </button>
    </div>

    <!-- Main Section (shown when authenticated) -->
    <div id="main-section" style="display: none;">
      <!-- User Info -->
      <div class="user-info" id="user-info" style="display: none;">
        <img id="user-avatar" src="" alt="">
        <span class="name" id="user-name"></span>
        <span class="logout" id="logout-btn">Disconnect</span>
      </div>

      <!-- Selection Info -->
      <div class="section">
        <h2>Selected Element</h2>
        <div id="selection-container">
          <div class="no-selection" id="no-selection">
            Select an element in Figma to see its styles
          </div>
          <div class="selection-info" id="selection-info" style="display: none;">
            <div class="label">Element</div>
            <div class="value" id="element-name">-</div>
            <div class="style-preview" id="style-preview"></div>
          </div>
        </div>
      </div>

      <!-- Target Settings -->
      <div class="section">
        <div class="form-group">
          <label for="selector-input">CSS Selector</label>
          <input type="text" id="selector-input" placeholder=".btn-primary, #hero-button">
        </div>

        <div class="form-group">
          <label for="repo-select">Repository</label>
          <select id="repo-select">
            <option value="">Select a repository...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="description-input">Change Description (optional)</label>
          <textarea id="description-input" placeholder="Update button styles to match Figma design"></textarea>
        </div>
      </div>

      <!-- Actions -->
      <div class="section">
        <button class="btn btn-primary btn-full" id="create-pr-btn" disabled>
          Apply Styles & Create PR
        </button>
      </div>

      <!-- Status -->
      <div id="status-container"></div>
    </div>

    <div class="footer">
      Powered by <a href="https://click-ship.dev" target="_blank">Click-Ship</a>
    </div>
  </div>

  <script src="ui.js"></script>
</body>
</html>
